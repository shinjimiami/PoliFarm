<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PolyFarm</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    :root {
      --paper: #ffffff;
      --wash: #f0f9fb;
      --mist: #e4f5f8;
      --mint: #d0eef3;
      --line: #bfe0e6;
      --ink: #0f2228;
      --muted: #4d7585;
      --leaf: #2ba7b7;
      --leaf-2: #1d8799;
      --leaf-3: #156a78;
      --yellow: #fff7d7;
      --yellow-line: #ead680;
      --orange: #fff0df;
      --orange-line: #e5aa70;
      --red: #fff0f0;
      --red-line: #e3a0a0;
      --shadow: 0 18px 48px rgba(27, 135, 153, .14);
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      background:
        linear-gradient(90deg, rgba(43, 167, 183, .045) 1px, transparent 1px),
        linear-gradient(rgba(43, 167, 183, .045) 1px, transparent 1px),
        #edf8fb;
      background-size: 28px 28px;
      color: var(--ink);
      font-family: Avenir Next, Manrope, ui-rounded, system-ui, sans-serif;
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    .phone {
      width: min(100%, 430px);
      min-height: 100vh;
      background: var(--wash);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      position: relative;
    }
    @media (min-width: 760px) {
      body { padding: 22px; align-items: flex-start; }
      .phone { min-height: calc(100vh - 44px); border: 1px solid var(--line); border-radius: 28px; overflow: hidden; }
    }
    .statusbar {
      height: 38px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--paper);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      flex: 0 0 auto;
    }
    .mqtt-dot { width: 7px; height: 7px; border-radius: 99px; background: #e7b949; display: inline-block; margin-right: 5px; }
    .mqtt-dot.ok { background: #18a66f; }
    .mqtt-dot.err { background: #d84949; }
    .scr { flex: 1; overflow: auto; }
    .scr::-webkit-scrollbar { width: 4px; }
    .scr::-webkit-scrollbar-thumb { background: #b9d8c5; border-radius: 999px; }
    .top {
      background: var(--paper);
      padding: 18px 20px 16px;
      border-bottom: 1px solid var(--line);
    }
    .step { color: var(--leaf); font-size: 12px; font-weight: 800; margin-bottom: 5px; }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 30px; line-height: .98; letter-spacing: -.8px; }
    h2 { font-size: 23px; line-height: 1.05; letter-spacing: -.5px; }
    h3 { font-size: 19px; letter-spacing: -.35px; }
    .sub { color: var(--muted); margin-top: 7px; font-size: 14px; line-height: 1.45; }
    .section { padding: 16px 20px 24px; }
    .stack { display: grid; gap: 12px; }
    .grid2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
    }
    .soft { background: var(--mist); }
    .field { display: grid; gap: 7px; }
    .field label { color: var(--leaf-2); font-size: 12px; font-weight: 800; }
    .input {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--paper);
      border-radius: var(--radius);
      padding: 13px 12px;
      outline: none;
      color: var(--ink);
      font-size: 15px;
    }
    .input:focus { border-color: var(--leaf); box-shadow: 0 0 0 3px rgba(43, 167, 183, .15); }
    .btn {
      width: 100%;
      border: 1px solid var(--leaf-2);
      background: var(--leaf-2);
      color: #effbf4;
      border-radius: var(--radius);
      min-height: 48px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 850;
    }
    .btn.secondary { background: var(--mist); color: var(--leaf-2); border-color: var(--line); }
    .btn.ghost { background: var(--paper); color: var(--leaf-2); border-color: var(--line); }
    .btn:disabled { background: #edf1ee; color: #9aa89f; border-color: #edf1ee; cursor: default; }
    .crop-card {
      min-height: 116px;
      text-align: left;
      border: 1px solid var(--line);
      background: var(--paper);
      border-radius: var(--radius);
      padding: 14px;
      position: relative;
      overflow: hidden;
    }
    .crop-card.selected {
      background: #dff5e8;
      border: 2px solid var(--leaf);
      padding: 13px;
    }
    .crop-visual {
      position: absolute;
      right: -8px;
      top: -16px;
      font-size: 76px;
      opacity: .16;
      transform: rotate(-8deg);
      line-height: 1;
    }
    .crop-icon {
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      background: #edf8f1;
      font-size: 25px;
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }
    .crop-card h3 { position: relative; z-index: 1; font-size: 22px; }
    .crop-card p { position: relative; z-index: 1; margin-top: 4px; color: var(--muted); font-weight: 650; }
    .sci { font-size: 11px; color: #829288; margin-top: 7px; line-height: 1.25; }
    .num-control {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) 42px;
      gap: 8px;
      align-items: center;
    }
    .stepper {
      border: 1px solid var(--line);
      background: var(--mist);
      color: var(--leaf-2);
      border-radius: var(--radius);
      height: 42px;
      font-size: 22px;
      font-weight: 800;
    }
    .bed-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
    .bed-tab {
      min-width: 58px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 9px 12px;
      background: var(--paper);
      color: var(--muted);
      font-weight: 800;
    }
    .bed-tab.active { background: var(--leaf-2); color: white; border-color: var(--leaf-2); }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 999px;
      padding: 5px 9px;
      background: var(--mist);
      color: var(--leaf-2);
      font-size: 12px;
      font-weight: 800;
    }
    .plain-list {
      display: grid;
      gap: 8px;
    }
    .plain-item {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 10px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      padding: 11px;
    }
    .plain-item i {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--mist);
      color: var(--leaf-2);
      font-style: normal;
      font-weight: 950;
    }
    .plain-item strong {
      display: block;
      color: var(--ink);
      font-size: 14px;
    }
    .plain-item span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      font-weight: 650;
    }
    .decision-card {
      border: 1px solid var(--line);
      border-left: 6px solid var(--leaf);
      border-radius: var(--radius);
      background: var(--paper);
      padding: 13px;
    }
    .decision-card h3 { color: var(--leaf-2); }
    .decision-card p {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      font-weight: 680;
    }
    .band-white { background: var(--paper); border-color: var(--line); color: var(--leaf-2); }
    .ph-good { background: #dff4f7; border-color: #7eccd8; color: var(--leaf-2); }
    .band-yellow { background: var(--yellow); border-color: var(--yellow-line); color: #76580a; }
    .band-orange { background: var(--orange); border-color: var(--orange-line); color: #85460f; }
    .band-red { background: var(--red); border-color: var(--red-line); color: #8b2525; }
    .scan-ring {
      width: 124px;
      height: 124px;
      border-radius: 999px;
      margin: 12px auto 18px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, var(--mint) 0 34%, transparent 35%),
        conic-gradient(var(--leaf) var(--scan), #c5dde2 0);
    }
    .scan-ring span {
      width: 76px;
      height: 76px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--paper);
      color: var(--leaf-2);
      font-size: 30px;
    }
    .scan-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      transition: border-color .2s ease, background .2s ease;
    }
    .scan-card.detected {
      border-color: rgba(43, 167, 183, .34);
      background: #f7fffa;
    }
    .scan-ph {
      margin-top: 6px;
      color: var(--leaf-2);
      font-size: 13px;
      font-weight: 900;
    }
    .scan-ph.waiting { color: var(--muted); }
    .progress {
      height: 7px;
      border-radius: 999px;
      background: #e4eee8;
      overflow: hidden;
    }
    .progress span { display: block; height: 100%; background: var(--leaf); width: var(--w); border-radius: inherit; transition: width .25s ease; }
    .ph-result-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .ph-result-card.band-orange,
    .ph-result-card.band-red,
    .ph-result-card.band-yellow { border-width: 2px; }
    .ph-result-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }
    .ph-number {
      display: block;
      margin-top: 5px;
      font-size: 44px;
      line-height: .9;
      letter-spacing: -1.2px;
      color: var(--leaf-2);
      font-weight: 950;
    }
    .ph-reco {
      border-radius: var(--radius);
      background: rgba(255,255,255,.72);
      border: 1px solid rgba(43, 167, 183, .12);
      padding: 10px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 850;
      line-height: 1.35;
    }
    .comp-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      padding: 14px;
      position: relative;
      overflow: hidden;
    }
    .comp-card.selected { border: 2px solid var(--leaf); padding: 13px; }
    .comp-head { display: grid; grid-template-columns: 58px 1fr auto; gap: 12px; align-items: center; }
    .comp-icon {
      width: 58px;
      height: 58px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      background: var(--mist);
      font-size: 30px;
    }
    .match { color: var(--leaf-2); font-size: 25px; font-weight: 900; letter-spacing: -.7px; }
    .detail { color: var(--muted); font-size: 13px; line-height: 1.45; margin-top: 10px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .tiny-box {
      border: 1px solid var(--line);
      background: var(--wash);
      border-radius: var(--radius);
      padding: 9px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.35;
    }
    .tiny-box b { color: var(--ink); display: block; margin-bottom: 2px; }
    .tiny-box.pro { background: #edf8fb; border-color: #aad8e2; }
    .tiny-box.con { background: #fff8ed; border-color: #efd7af; }
    .layout-wrap {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(#f8feff, #e8f6fa);
      padding: 12px;
      overflow: auto;
    }
    .bed-summary {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(135deg, #ffffff, #ecf7fa);
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    .bed-summary-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .bed-summary-head h3 {
      font-size: 24px;
      color: var(--leaf-2);
    }
    .bed-summary-head p {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }
    .bed-summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .bed-stat {
      border: 1px solid rgba(43, 167, 183, .12);
      border-radius: var(--radius);
      background: rgba(255,255,255,.78);
      padding: 9px;
    }
    .bed-stat b {
      display: block;
      color: var(--leaf-2);
      font-size: 17px;
      line-height: 1;
    }
    .bed-stat span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 850;
    }
    .field-map {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(#ffffff, #eaf5f8);
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    .bed-map-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
    }
    .bed-map-tile {
      border: 1px solid var(--line);
      background: #fbfffc;
      border-radius: var(--radius);
      padding: 10px;
      text-align: left;
      color: var(--ink);
    }
    .bed-map-tile.active { border: 2px solid var(--leaf); padding: 9px; background: #f2fbf5; }
    .bed-map-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }
    .bed-mini-map {
      position: relative;
      height: 104px;
      border: 2px solid var(--leaf-2);
      border-radius: var(--radius);
      background:
        linear-gradient(90deg, rgba(43,167,183,.08) 1px, transparent 1px),
        linear-gradient(rgba(43,167,183,.08) 1px, transparent 1px),
        #f4fbfc;
      background-size: 24px 24px;
      overflow: hidden;
    }
    .bed-mini-dot {
      position: absolute;
      transform: translate(-50%, -50%) scale(.72);
      display: grid;
      place-items: center;
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(8, 36, 28, .38);
      display: grid;
      place-items: end center;
      z-index: 20;
      padding: 16px;
    }
    .bed-modal {
      width: min(100%, 420px);
      max-height: min(84vh, 720px);
      overflow: auto;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 16px 16px var(--radius) var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--mist);
      color: var(--leaf-2);
      font-size: 20px;
      font-weight: 900;
    }
    .mini-action {
      width: 100%;
      min-height: 42px;
      margin-top: 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--mist);
      color: var(--leaf-2);
      font-weight: 900;
    }
    .layout {
      position: relative;
      width: var(--layout-w);
      min-width: 220px;
      height: var(--layout-h);
      min-height: 260px;
      margin: auto;
      border: 2px solid var(--leaf-2);
      background: #f4fbfc;
      border-radius: var(--radius);
    }
    .layout-guide-line {
      position: absolute;
      background: rgba(43, 167, 183, .1);
      pointer-events: none;
      z-index: 0;
    }
    .layout-guide-line.v {
      top: 0;
      bottom: 0;
      width: 1px;
      transform: translateX(-50%);
    }
    .layout-guide-line.h {
      left: 0;
      right: 0;
      height: 1px;
      transform: translateY(-50%);
    }
    .plant-dot {
      position: absolute;
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      font-size: 15px;
      background: white;
      border: 1px solid rgba(27, 135, 153, .25);
    }
    .plant-dot.comp { width: 14px; height: 14px; font-size: 12px; background: #e7f7ed; }
    .plant-dot.refugia { width: 15px; height: 15px; font-size: 12px; background: #fff5de; }
    .spacing-guide {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(#ffffff, #ecf8fb);
      padding: 12px;
      overflow: hidden;
    }
    .spacing-guide-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .spacing-guide-head strong { color: var(--leaf-2); font-size: 14px; }
    .spacing-guide-head span { display: block; color: var(--muted); font-size: 11px; font-weight: 800; margin-top: 2px; }
    .guide-arrow {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: var(--mist);
      color: var(--leaf-2);
      font-size: 18px;
      font-weight: 900;
    }
    .guide-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin: 8px 0 10px;
    }
    .guide-tab {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--paper);
      color: var(--muted);
      padding: 7px 5px;
      font-size: 10px;
      font-weight: 900;
    }
    .guide-tab.active {
      background: var(--leaf-2);
      border-color: var(--leaf-2);
      color: white;
    }
    .spacing-stage {
      position: relative;
      height: 178px;
      border: 1px solid #cde4d5;
      border-radius: var(--radius);
      background: #fbfffc;
    }
    .guide-grid-line {
      position: absolute;
      background: rgba(43, 167, 183, .1);
      z-index: 0;
    }
    .guide-grid-line.v { top: 0; bottom: 0; width: 1px; }
    .guide-grid-line.h { left: 0; right: 0; height: 1px; }
    .spacing-dot {
      position: absolute;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      z-index: 3;
    }
    .spacing-line {
      position: absolute;
      background: var(--leaf-2);
      opacity: .72;
      z-index: 2;
    }
    .spacing-line.h { height: 2px; transform: translateY(-50%); }
    .spacing-line.v { width: 2px; transform: translateX(-50%); }
    .spacing-line::before,
    .spacing-line::after {
      content: "";
      position: absolute;
      width: 7px;
      height: 7px;
      border-top: 2px solid var(--leaf-2);
      border-right: 2px solid var(--leaf-2);
    }
    .spacing-line.h::before { left: -2px; top: -3px; transform: rotate(-135deg); }
    .spacing-line.h::after { right: -2px; top: -3px; transform: rotate(45deg); }
    .spacing-line.v::before { top: -2px; left: -3px; transform: rotate(-45deg); }
    .spacing-line.v::after { bottom: -2px; left: -3px; transform: rotate(135deg); }
    .spacing-label {
      position: absolute;
      padding: 3px 7px;
      border-radius: 999px;
      background: var(--paper);
      border: 1px solid var(--line);
      color: var(--leaf-2);
      font-size: 10px;
      font-weight: 900;
      white-space: nowrap;
      box-shadow: 0 4px 12px rgba(27, 135, 153, .07);
      transform: translate(-50%, -50%);
      z-index: 4;
    }
    .companion-strip {
      position: absolute;
      border: 1px dashed rgba(27, 135, 153, .45);
      background: rgba(223, 244, 232, .65);
      border-radius: 6px;
      z-index: 1;
    }
    .guide-caption {
      margin-top: 9px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      font-weight: 760;
    }
    .field-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .field-tab {
      min-width: 116px;
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--muted);
      border-radius: var(--radius);
      padding: 10px;
      text-align: left;
    }
    .field-tab.active {
      border-color: var(--leaf);
      background: var(--mist);
      color: var(--leaf-2);
    }
    .field-tab strong { display: block; font-size: 13px; }
    .field-tab span { display: block; margin-top: 2px; font-size: 11px; font-weight: 700; }
    .demo-strip {
      border: 1px solid rgba(159, 225, 203, .52);
      background: linear-gradient(135deg, #158898, #2ba7b7);
      color: #effbf4;
      border-radius: var(--radius);
      padding: 13px;
      display: grid;
      gap: 9px;
    }
    .demo-strip p { color: #bfead9; font-size: 13px; line-height: 1.42; }
    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 5px;
      background: var(--mist);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }
    .segment {
      border: 0;
      border-radius: 6px;

      buncis:{n:'Bean', common:'Bean', kind:'Legume companion', visual:'🫘', spacing:[20,40], ph:[6,7], temp:[18,25], note:'Adds nitrogen and uses a different canopy layer.', detail:'Works as a light companion when trellised carefully.', caution:'Keep away from garlic-heavy sections.'},
      zinnia:{n:'Zinnia', common:'Zinnia', kind:'Refugia', visual:'🌸', spacing:[30,30], ph:[5.5,7.5], temp:[20,32], note:'Attracts pollinators and syrphid flies.', detail:'Colorful refugia patch for predator support.', caution:'Needs airflow to prevent mildew.'},

      kenikir:{n:'Cosmos', common:'Cosmos', kind:'Refugia', visual:'🌺', spacing:[40,40], ph:[5.5,7], temp:[22,32], note:'Attracts predators for aphids and leafhoppers.', detail:'Good edge refugia in warm beds.', caution:'Prune before it dominates edges.'},

      kedelai_sela:{n:'Soybean intercrop', common:'Soybean intercrop', kind:'Legume companion', visual:'🌱', spacing:[40,15], ph:[6,6.5], temp:[25,30], note:'Low intercropping layer that adds nitrogen.', detail:'Fits below cassava while light is available.', caution:'pH needs are narrower than cassava.'},
      arachis:{n:'Arachis pintoi', common:'Pinto peanut', kind:'Ground cover', visual:'🍀', spacing:[40,40], ph:[5.5,7], temp:[22,32], note:'Perennial living mulch and erosion control.', detail:'Strong choice below coconut or cassava.', caution:'Needs establishment time.'},
      mucuna:{n:'Mucuna bracteata', common:'Mucuna', kind:'LCC', visual:'🌿', spacing:[100,100], ph:[5,6.5], temp:[24,32], note:'Large living cover for plantations.', detail:'Excellent for coconut spacing and soil cover.', caution:'Too vigorous for small vegetable beds.'},

      jagung_sela:{n:'Corn strip', common:'Corn strip', kind:'Structure crop', visual:'🌽', spacing:[75,20], ph:[5.5,7.5], temp:[25,33], note:'Adds vertical structure and canopy diversity.', detail:'Use in strips beside soybean, not as a dense mix.', caution:'Can outcompete if planted too close.'},
      kubis:{n:'Cabbage', common:'Cabbage', kind:'Between-row crop', visual:'🥬', spacing:[40,50], ph:[5.5,6.5], temp:[15,20], note:'Compact leaf crop for between-row placement where shade is controlled.', detail:'Place between soybean rows when airflow is good and harvest timing is short.', caution:'Needs cooler sections and steady moisture.'},
      krokot:{n:'Purslane', common:'Purslane', kind:'Ground cover', visual:'🌿', spacing:[20,20], ph:[5.5,7], temp:[25,35], note:'Heat-tolerant soil cover and mineral accumulator.', detail:'Keeps bare soil shaded in hot beds.', caution:'Can spread quickly.'},
      pegagan:{n:'Gotu kola', common:'Gotu kola', kind:'Ground cover', visual:'🍀', spacing:[20,20], ph:[5.5,7], temp:[22,30], note:'Loves moist beds and covers soil around taro.', detail:'Pairs well with wet or partly shaded raised beds.', caution:'Avoid drought stress.'},
      torenia:{n:'Torenia', common:'Wishbone flower', kind:'Refugia', visual:'🌷', spacing:[20,20], ph:[5.5,6.5], temp:[20,28], note:'Small flowering refugia for shaded humid areas.', detail:'Good near talas where taller flowers struggle.', caution:'Needs moist soil.'}
    };

    const live = {temp_air:26, hum_air:65, hum_soil:48, ph_soil:6.4, lat:null, long:null, ts:null};
    const seedFields = [
      {
        name:'Kebun A',
        crop:'cabai',
        target:80,
        layoutMode:'edge',
        chosen:{},
        placements:{},
        beds:[
          {id:'A1', name:'Bed A1', length:7, width:2, ph:6.2, moisture:52, lat:-6.2001, lng:106.8171},
        ]
      },
    ];
    const st = {
      screen:'login',
      tab:'dashboard',
      fields: JSON.parse(JSON.stringify(seedFields)),
      activeField:0,
      fieldName:'Kebun A',
      crop:'cabai',
      target:80,
      layoutMode:'edge',
      q:'',
      setupBed:0,
      scanned:0,
      activeBed:'A1',
      expandedBed:null,
      mapPopupBed:null,
      guideStep:0,
      chosen:{},
      placements:{},
      polycatOpen:{},
      polycatCancelled:{},
      survey: {season:'rainy', pests:['caterpillar'], irrigation:true, chemFert:false},
      beds:[
        {id:'A1', name:'Bed A1', length:7, width:2, ph:6.2, moisture:52, lat:-6.2001, lng:106.8171},
      ]
    };

    function saveField() {
      st.fields[st.activeField] = {
        name: st.fieldName,
        crop: st.crop,
        target: st.target,
        layoutMode: st.layoutMode,
        chosen: {...st.chosen},
        placements: {...st.placements},
        beds: st.beds.map(b => ({...b}))
      };
    }
    function loadField(index) {
      saveField();
      st.activeField = clamp(index, 0, st.fields.length - 1);
      const f = st.fields[st.activeField];
      st.fieldName = f.name;
      st.crop = f.crop;
      st.target = f.target;
      st.layoutMode = f.layoutMode || 'edge';
      st.chosen = {...(f.chosen || {})};
      st.placements = {...(f.placements || {})};
      st.beds = f.beds.map(b => ({...b}));
      st.setupBed = 0;
      st.q = '';
      st.activeBed = st.beds[0]?.id || 'A1';
      st.expandedBed = null;
      st.mapPopupBed = null;
      render();
    }
    function createField() {
      saveField();
      const n = st.fields.length + 1;
      st.fields.push({
        name:`Field ${n}`,
        crop:'cabai',
        target:60,
        layoutMode:'edge',
        chosen:{},
        placements:{},
        beds:[{id:'A1', name:'Bed A1', length:7, width:1.2, ph:6.1, moisture:46, lat:-6.2005, lng:106.8175}]
      });
      loadField(st.fields.length - 1);
      st.screen = 'field';
      st.tab = 'dashboard';
      st.expandedBed = null;
      st.mapPopupBed = null;
      render();
    }
    function removeField() {
      if (st.fields.length <= 1) return;
      const removed = st.activeField;
      st.fields.splice(removed, 1);
      st.activeField = clamp(removed - 1, 0, st.fields.length - 1);
      const f = st.fields[st.activeField];
      st.fieldName = f.name;
      st.crop = f.crop;
      st.target = f.target;
      st.layoutMode = f.layoutMode || 'edge';
      st.chosen = {...(f.chosen || {})};
      st.placements = {...(f.placements || {})};
      st.beds = f.beds.map(b => ({...b}));
      st.setupBed = 0;
      st.activeBed = st.beds[0]?.id || 'A1';
      st.expandedBed = null;
      st.mapPopupBed = null;
      render();
    }
    function startDemo() {
      saveField();
      const demo = JSON.parse(JSON.stringify(seedFields[1]));
      const existing = st.fields.findIndex(f => f.name === demo.name);
      if (existing >= 0) st.fields[existing] = demo;
      else st.fields.push(demo);
      loadField(existing >= 0 ? existing : st.fields.length - 1);
      st.screen = 'field';
      render();
    }
    function fieldTabs() {
      return `<div class="field-tabs">
        ${st.fields.map((f, i) => {
          const c = crops.find(x => x.id === f.crop) || crops[0];
          return `<button class="field-tab ${i===st.activeField?'active':''}" onclick="loadField(${i})"><strong>${f.name}</strong><span>${c.common} · ${f.beds.length} ${f.beds.length === 1 ? 'bed' : 'beds'}</span></button>`;
        }).join('')}
        <button class="field-tab" onclick="createField()"><strong>+ New field</strong><span>start Chili onboarding</span></button>
      </div>`;
    }
    function crop() { return crops.find(x => x.id === st.crop) || crops[0]; }
    function clamp(v, min, max) { return Math.min(Math.max(v, min), max); }
    function num(v, fallback) { const n = Number(String(v).replace(',', '.')); return Number.isFinite(n) ? n : fallback; }
    function fmt(v, d=0) { return new Intl.NumberFormat('en-US', {maximumFractionDigits:d}).format(v); }
    function fmtPlain(v, d=2) { return Number(v).toFixed(d).replace(/\.?0+$/, ''); }
    function fmtPh(v) { return (Math.round(Number(v) * 10) / 10).toFixed(1).replace(/\.0$/, ''); }
    function fmtRange(r) { return `${fmtPh(r[0])}-${fmtPh(r[1])}`; }
    function bedArea(b) { return b.length * b.width; }
    function totalArea() { return st.beds.reduce((a,b) => a + bedArea(b), 0) || 1; }
    function bedShare(b) { return bedArea(b) / totalArea(); }
    function selectedCompanion(b) { return st.chosen[b.id] || crop().companions[0]; }
    function suggestedPlacement(id) {
      if (['jagung_sela','bunga_matahari','sereh','marigold'].includes(id)) return 'perimeter';
      if (['kubis','selada','bayam','buncis','kacang_panjang'].includes(id)) return 'between';
      return 'edge';
    }
    function selectedPlacement(b) { return st.placements[b.id] || suggestedPlacement(selectedCompanion(b)) || st.layoutMode; }
    function placementLabel(mode) {
      return mode === 'perimeter' ? 'Perimeter' : mode === 'between' ? 'Between rows' : 'Side rows';
    }
    function chooseCompanion(bid, id) {
      st.chosen[bid] = id;
      st.placements[bid] = suggestedPlacement(id);
      saveField();
      render();
    }
    function setCompanionPlacement(bid, mode) {
      st.placements[bid] = mode;
      saveField();
      render();
    }
    function toggleBedExpanded(id) {
      st.expandedBed = st.expandedBed === id ? null : id;
      st.activeBed = id;
      render(false);
    }
    function viewBedDetails(id) {
      st.activeBed = id;
      st.expandedBed = id;
      st.mapPopupBed = null;
      showMain('beds');
    }
    function openBedPopup(id) {
      st.activeBed = id;
      st.mapPopupBed = id;
      render(false);
    }
    function closeBedPopup() {
      st.mapPopupBed = null;
      render(false);
    }
    function bedCoord(b, index = 0) {
      const lat = b.lat ?? live.lat ?? (-6.2 - index * .0002);
      const lng = b.lng ?? live.long ?? (106.817 + index * .0002);
      return {lat, lng};
    }
    function axisPositions(sizeCm, gapCm, count = null) {
      const n = count ?? Math.max(1, Math.floor(sizeCm / Math.max(gapCm, 1)));
      if (n <= 1) return [sizeCm / 2];
      const span = (n - 1) * gapCm;
      const start = (sizeCm - span) / 2;
      return Array.from({length:n}, (_, i) => start + i * gapCm);
    }
    function percentPos(cm, totalCm) {
      return clamp((cm / Math.max(totalCm, 1)) * 100, 0, 100);
    }
    function bedGeometry(b, p = calcBed(b)) {
      const widthCm = b.width * 100;
      const lengthCm = b.length * 100;
      return {
        widthCm,
        lengthCm,
        xs: axisPositions(widthCm, p.actualX, p.cols),
        ys: axisPositions(lengthCm, p.actualY, p.rows)
      };
    }
    function companionPositions(b, p, comp, placement, g) {
      const positions = [];
      const compX = Math.max(10, comp.spacing?.[0] || p.actualX);
      const compY = Math.max(10, comp.spacing?.[1] || p.actualY);
      const add = (x, y) => positions.push({x:percentPos(x, g.widthCm), y:percentPos(y, g.lengthCm)});
      if (placement === 'perimeter') {
        const edgeY = Math.min(compY / 2, g.lengthCm * .05);
        const edgeX = Math.min(compX / 2, g.widthCm * .08);
        axisPositions(g.widthCm, compX).forEach(x => {
          add(x, edgeY);
          add(x, g.lengthCm - edgeY);
        });
        axisPositions(g.lengthCm, compY).forEach(y => {
          add(edgeX, y);
          add(g.widthCm - edgeX, y);
        });
      } else if (placement === 'between') {
        const lanes = [];
        for (let i = 0; i < g.xs.length - 1; i++) {
          const gap = g.xs[i + 1] - g.xs[i];
          if (gap >= compX * .55) lanes.push((g.xs[i] + g.xs[i + 1]) / 2);
        }
        if (!lanes.length) lanes.push(g.widthCm / 2);
        const yGap = Math.max(compY, p.actualY);
        axisPositions(g.lengthCm, yGap).forEach(y => lanes.forEach(x => add(x, y)));
      } else {
        const sideX = Math.min(compX / 2, g.widthCm * .08);
        axisPositions(g.lengthCm, compY).forEach(y => {
          add(sideX, y);
          add(g.widthCm - sideX, y);
        });
      }
      return positions;
    }

    function rangeScore(value, range, soft, hard) {
      const gap = Math.max(range[0] - value, value - range[1], 0);
      if (gap <= soft) return 100;
      if (gap >= hard) return 35;
      return Math.round(100 - ((gap - soft) / (hard - soft)) * 55);
    }
    function band(score) {
      if (score >= 82) return {cls:'band-white', label:'Good'};
      if (score >= 70) return {cls:'band-yellow', label:'Watch'};
      if (score >= 55) return {cls:'band-orange', label:'Caution'};
      return {cls:'band-red', label:'High risk'};
    }
    function calcBed(b) {
      const c = crop();
      const [sx, sy] = c.spacing;
      const naturalCols = Math.max(1, Math.floor((b.width * 100) / sx));
      const naturalRows = Math.max(1, Math.floor((b.length * 100) / sy));
      const naturalCount = naturalCols * naturalRows;
      const bedTargetKg = st.target * bedShare(b);
      const neededPlants = Math.max(1, Math.ceil(bedTargetKg / c.yield));
      const pressure = Math.sqrt(naturalCount / neededPlants);
      const spacingFactor = clamp(pressure, .5, 1.18);
      const actualX = Math.max(10, Math.round(sx * spacingFactor));
      const actualY = Math.max(10, Math.round(sy * spacingFactor));
      const cols = Math.max(1, Math.floor((b.width * 100) / actualX));
      const rows = Math.max(1, Math.floor((b.length * 100) / actualY));
      const count = cols * rows;
      const yieldKg = count * c.yield;
      const densityLoss = Math.max(0, .85 - pressure);
      const quality = clamp(Math.round(100 - densityLoss * 150), 18, 100);
      const phScore = rangeScore(b.ph, c.ph, .12, .8);
      const tempScore = rangeScore(live.temp_air, c.temp, 1.5, 6);
      const moistureScore = rangeScore(b.moisture, [40, 82], 4, 18);
      const env = Math.round(phScore * .45 + tempScore * .3 + moistureScore * .25);
      return {c, sx, sy, actualX, actualY, naturalCount, neededPlants, bedTargetKg, cols, rows, count, yieldKg, quality, env, phScore, tempScore, moistureScore, spacingFactor};
    }
    function planNote(p) {
      const q = band(p.quality);
      const e = band(p.env);
      if (q.label === 'High risk') return 'Target is forcing a very dense plan. Add bed area or reduce target to protect plant quality.';
      if (q.label === 'Caution') return 'Spacing is meaningfully tighter than the crop recommendation. This is usable, but monitor airflow and vigor.';
      if (e.label === 'High risk') return 'Soil or surrounding condition is far outside the recommended crop range.';
      if (e.label === 'Caution') return 'Environment needs correction before planting for best result.';
      if (q.label === 'Watch' || e.label === 'Watch') return 'Within watch range. No alarm yet, just keep an eye on this bed.';
      return 'Recommendation is inside the relaxed safety margin.';
    }
    function phBandForBed(b) {
      const score = rangeScore(b.ph, crop().ph, .12, .8);
      if (score >= 82) return {cls:'ph-good', label:'Optimal'};
      if (b.ph < crop().ph[0]) return {cls:score >= 55 ? 'band-orange' : 'band-red', label:score >= 55 ? 'Acidic' : 'Very acidic'};
      return {cls:score >= 55 ? 'band-orange' : 'band-red', label:score >= 55 ? 'Alkaline' : 'Very alkaline'};
    }
    function phRecommendation(b) {
      const [min, max] = crop().ph;
      if (b.ph < min - .45) return 'Add 150g/m² of lime before transplanting.';
      if (b.ph < min) return 'Add 150g/m² of lime and retest after watering.';
      if (b.ph > max + .45) return 'Add compost and avoid extra ash this cycle.';
      if (b.ph > max) return 'Blend organic matter and monitor next scan.';
      return 'pH is optimal. Keep current soil treatment.';
    }
    function farmerDensityText(p) {
      if (p.quality < 55) return 'Too crowded. Add more bed area or lower the harvest target.';
      if (p.quality < 82) return 'A little tight. Keep airflow open and monitor plant strength.';
      return 'Spacing is comfortable for this target.';
    }
    function bedActionHTML(b, p = calcBed(b)) {
      const comp = companionDb[selectedCompanion(b)];
      return `<div class="plain-list">
        <div class="plain-item"><i>1</i><div><strong>Plant ${p.count} ${crop().common.toLowerCase()} plants</strong><span>Use ${p.actualX} cm between plants and ${p.actualY} cm between rows.</span></div></div>
        <div class="plain-item"><i>2</i><div><strong>${phRecommendation(b)}</strong><span>Current pH is ${fmtPh(b.ph)} for this bed.</span></div></div>
        <div class="plain-item"><i>3</i><div><strong>Add ${comp.common.toLowerCase()} as companion</strong><span>${placementLabel(selectedPlacement(b))}. ${comp.note}</span></div></div>
      </div>`;
    }
    function fieldNextStepHTML() {
      const worst = st.beds.map(b => ({b, p:calcBed(b)})).sort((a, b) => Math.min(a.p.quality, a.p.env) - Math.min(b.p.quality, b.p.env))[0];
      if (!worst) return '';
      const status = band(Math.min(worst.p.quality, worst.p.env));
      return `<div class="decision-card ${status.cls}">

    function bedMixProsCons(bedId) {
      const b = st.beds.find(x => x.id === bedId) || st.beds[0];
      const choices = st.polycatChoice?.[bedId] || {};
      const sv = st.survey || {};
      const pests = sv.pests || [];
      const pros = [], cons = [];
      // pH compatibility across all selections
      let phMismatches = 0;
      POLYCAT_DEFS.forEach(cat => {
        const plant = POLYCAT_PLANTS[cat.key].find(p => p.id === choices[cat.key]);
        if (!plant?.ph) return;
        const gap = Math.max((plant.ph[0] - b.ph), (b.ph - plant.ph[1]), 0);
        if (gap > 0.5) { phMismatches++; cons.push(`${plant.name} (${cat.label}) is outside its ideal pH range — may underperform at pH ${fmtPh(b.ph)}`); }
      });
      if (phMismatches === 0) pros.push(`All selected plants are compatible with pH ${fmtPh(b.ph)}`);
      // Season
      if (sv.season === 'dry') {
        const droughtIds = ['krokot_gc','sereh_h','kunyit_h','arachis_gc','crotalaria_lcc'];
        if (POLYCAT_DEFS.some(cat => droughtIds.includes(choices[cat.key]))) pros.push('Mix includes drought-tolerant plants suited for dry season');
        const wetIds = ['selada_ic','semanggi_gc','pegagan_gc'];
        if (POLYCAT_DEFS.some(cat => wetIds.includes(choices[cat.key]))) cons.push('Some selections prefer moist conditions — monitor during dry months');
      } else if (sv.season === 'rainy') {
        const moistIds = ['pegagan_gc','mucuna_lcc','calopo_lcc'];
        if (POLYCAT_DEFS.some(cat => moistIds.includes(choices[cat.key]))) pros.push('Rainy season supports ground cover and LCC establishment');
        if (b.moisture > 65) cons.push('High moisture in rainy season may increase fungal risk in dense plantings');
      }
      // Pests
      if (pests.includes('aphids')) {
        const repelIds = ['kemangi_h','sereh_h','marigold_r','zinnia_r'];
        if (POLYCAT_DEFS.some(cat => repelIds.includes(choices[cat.key]))) pros.push('Selected mix includes aphid-repelling plants (active protection)');
        else cons.push('Aphids detected — consider Marigold or Basil in the mix for better protection');
      }
      if (pests.includes('caterpillar')) {
        const catIds = ['marigold_r','zinnia_r','kenikir_r'];
        if (POLYCAT_DEFS.some(cat => catIds.includes(choices[cat.key]))) pros.push('Refugia selection attracts parasitoid wasps that control caterpillars');
      }
      if (pests.includes('fungi')) {
        const fungiIds = ['kunyit_h','jahe_h'];
        if (POLYCAT_DEFS.some(cat => fungiIds.includes(choices[cat.key]))) pros.push('Turmeric/Ginger provides antifungal compounds — active soil protection');
        else cons.push('Fungal issues present — Turmeric or Ginger would add antifungal protection');
      }
      // Irrigation
      if (sv.irrigation === false) {
        const lowWaterIds = ['krokot_gc','arachis_gc','kunyit_h','sereh_h','crotalaria_lcc'];
        if (POLYCAT_DEFS.some(cat => lowWaterIds.includes(choices[cat.key]))) pros.push('Several selections are low-water — practical without irrigation');
        const needWaterIds = ['selada_ic','pegagan_gc','semanggi_gc'];
        if (POLYCAT_DEFS.some(cat => needWaterIds.includes(choices[cat.key]))) cons.push('Some plants need consistent moisture — risk of stress without irrigation');
      }
      // Chemical fert
      if (sv.chemFert === true) {
        const lccIds = ['mucuna_lcc','calopo_lcc','crotalaria_lcc','pueraria_lcc'];
        if (POLYCAT_DEFS.some(cat => lccIds.includes(choices[cat.key]))) pros.push('LCC selection fixes nitrogen naturally — reduces chemical fertilizer dependency');
      }
      if (pros.length === 0) pros.push('All plants are compatible with current bed conditions');
      if (cons.length === 0) cons.push('No significant risks detected with current selection');
      return { pros: pros.slice(0, 3), cons: cons.slice(0, 2) };
    }
    function plantRiskText(plant, catKey, b) {
      const phGap = Math.max((plant.ph?.[0]||5) - b.ph, b.ph - (plant.ph?.[1]||8), 0);
      if (phGap > 0.5) return `pH ${fmtPh(b.ph)} is outside ${plant.name}'s ideal range (${(plant.ph?.[0]||'?')}–${(plant.ph?.[1]||'?')}) — may cause nutrient deficiency or poor growth`;
      if (phGap > 0.2) return `pH slightly outside ideal range — monitor plant vigor in the first two weeks`;
      const sv = st.survey || {};
      if (sv.season === 'dry' && ['selada_ic','semanggi_gc'].includes(plant.id)) return `${plant.name} prefers cooler, wetter conditions — may bolt or fail to establish in dry season`;
      if (sv.irrigation === false && ['pegagan_gc','selada_ic'].includes(plant.id)) return `${plant.name} needs consistent moisture — high risk of wilting without irrigation`;
      const mo = b.moisture;
      if (catKey === 'groundcover' && plant.id === 'semanggi_gc' && mo < 40) return 'Clover needs higher moisture to establish — may fail in this dry bed';
      return 'Lower match score — will still grow, but not optimal for this specific bed';
    }

    function moistureBand(moisture) {
      if (moisture >= 45 && moisture <= 70) return {cls:'ph-good', label:'Optimal'};
      if (moisture >= 38 && moisture <= 78) return {cls:'band-yellow', label:'Watch'};
      if (moisture >= 28 && moisture <= 84) return {cls:'band-orange', label:'Low'};
      return {cls:'band-red', label:'Very dry'};
    }
    function moistureRecommendation(b) {
      const m = b.moisture;
      const c = crop();
      if (m < 28) return 'Critically dry — water thoroughly and cover with organic mulch for 3–5 days before planting.';
      if (m < 38) return 'Too dry — irrigate slowly (drip preferred) and let moisture distribute over 24 hours.';
      if (m < 44) return 'Slightly below ideal — water 1–2 days before transplanting and maintain mulch cover.';
      if (m > 84) return 'Waterlogged — check drainage channels and wait 4–7 days to avoid root rot.';
      if (m > 75) return 'High moisture — ensure drainage is clear and monitor for fungal disease in first 2 weeks.';
      return `Moisture at ${m}% is ideal for ${c.common}. Maintain with drip irrigation or mulch cover.`;
    }
    function overallBedStatus(b) {
      const ph = phBandForBed(b);
      const mo = moistureBand(b.moisture);
      const worst = [ph.cls, mo.cls].includes('band-red') ? 'band-red'
        : [ph.cls, mo.cls].includes('band-orange') ? 'band-orange'
        : [ph.cls, mo.cls].includes('band-yellow') ? 'band-yellow'
        : 'ph-good';
      const labels = {'ph-good':'Balanced','band-yellow':'Watch','band-orange':'Needs treatment','band-red':'Needs treatment'};
      return {cls: worst, label: labels[worst]};
    }

    // Returns top-2 priority category keys based on survey answers
    // Default push: intercrop (income diversification) + herbs (pest repellent)
    function getPriorityCats(sv) {
      const priority = [];
      const pests = (sv?.pests || []).filter(p => p !== 'none');
      if (pests.includes('caterpillar')) { priority.push('refugia'); priority.push('herbs'); }
      else if (pests.length > 0) { priority.push('herbs'); priority.push('intercrop'); }
      if (sv?.irrigation === false && sv?.season === 'dry') { priority.length = 0; priority.push('groundcover'); priority.push('intercrop'); }
      if (sv?.chemFert === true && !priority.includes('lcc')) priority.unshift('lcc');
      if (priority.length < 2 && !priority.includes('herbs')) priority.push('herbs');
      if (priority.length < 2 && !priority.includes('intercrop')) priority.push('intercrop');
      return priority.slice(0, 2);
    }

    // Per-category skip warnings — different consequences per type
    function catSkipWarning(catKey, sv) {
      const pests = (sv?.pests || []).filter(p => p !== 'none');
      const hasPest = pests.length > 0;
      switch (catKey) {
        case 'intercrop':
          return 'No supplementary harvest income during the main crop cycle. Bare soil between rows increases weed pressure by ~35% and raises root-zone temperature by 5–8°C — direct stress on shallow-rooted crops.';
        case 'refugia':
          return hasPest
            ? `Natural biocontrol removed while ${pests.join('/')} pressure is active. Parasitoid wasps and predatory insects won't be attracted — expect 20–30% higher pest control cost this season.`
            : 'No beneficial insect recruitment. Without refugia flowers, parasitoid wasp and syrphid fly populations won\'t establish — preventive biocontrol is lost for the entire season.';
        case 'groundcover':
          return sv?.irrigation === false
            ? 'CRITICAL without irrigation — unprotected topsoil loses up to 40% more moisture through evaporation. Soil compaction accelerates and drought stress risk on main crop roots increases significantly.'
            : 'Exposed topsoil loses moisture faster and is vulnerable to erosion during irrigation and heavy rain. Weed germination rate increases — manual weeding labor cost rises ~25%.';
        case 'lcc':
          return sv?.chemFert === true
            ? 'Soil microbiome already compromised by chemical fertilizer — skipping LCC delays biological recovery by 1–2 seasons. External nitrogen supplement of 60–150 kg/ha required as replacement.'

    // ── Polyculture planting recommendation system ──

    // 4 plants per category from research database (Tables 2–6)

    // Match score for a specific plant in a category against a bed's conditions
    function polycatPlantScore(plant, catKey, b) {
      // pH compatibility
      const phGap = Math.max((plant.ph?.[0]||5) - b.ph, b.ph - (plant.ph?.[1]||8), 0);
      const phScore = phGap===0?96 : phGap<=0.2?82 : phGap<=0.5?65 : phGap<=0.8?48 : 30;
      // Temperature (tropical default ~27°C)
      const t = live.temp_air||27;
      const tGap = plant.temp ? Math.max(plant.temp[0]-t, t-plant.temp[1], 0) : 0;
      const tempScore = tGap===0?94 : tGap<=2?78 : tGap<=5?58 : 38;
      // Moisture compatibility
      let moistScore = 82; const mo = b.moisture;
      if (catKey==='groundcover') {
        if      (plant.id==='krokot_gc')   moistScore = mo<44?95:mo<55?84:70;
        else if (plant.id==='semanggi_gc') moistScore = mo>=48?94:mo>=38?75:50;
        else if (plant.id==='pegagan_gc')  moistScore = mo>=46?92:mo>=36?72:52;
        else moistScore = 88;
      } else if (catKey==='intercrop') {
        if      (plant.id==='selada_ic')  moistScore = mo>=45?90:75;
        else if (plant.id==='bayam_ic')   moistScore = mo<50?90:80;
        else moistScore = 85;
      } else { moistScore = mo>=40&&mo<=75?88:mo>=30?72:55; }
      // Crop synergy
      let syn = 80;
      const cid = crop().id; const sol = ['tomat','cabai','terung'];
      if (catKey==='intercrop') {
        if (plant.id==='selada_ic'  && sol.includes(cid))    syn=96;
        if (plant.id==='kacangp_ic' && cid==='jagung')        syn=98;
        if (plant.id==='pakcoy_ic'  && sol.includes(cid))    syn=90;
        if (plant.id==='bayam_ic'   && ['jagung','singkong'].includes(cid)) syn=92;
      } else if (catKey==='refugia') {
        if (plant.id==='marigold_r'  && sol.includes(cid))   syn=98;
        if (plant.id==='sunflower_r' && cid==='jagung')       syn=96;
        if (plant.id==='zinnia_r')  syn=87; if (plant.id==='kenikir_r') syn=85;
      } else if (catKey==='herbs') {
        if (plant.id==='kemangi_h' && sol.includes(cid))     syn=98;
        if (plant.id==='jahe_h'    && sol.includes(cid))     syn=88;
        if (plant.id==='sereh_h')  { const hasCat=(st.survey?.pests||[]).includes('caterpillar'); syn=hasCat?98:86; }
        if (plant.id==='kunyit_h') syn=84;
      } else syn=85;
      return Math.min(99, Math.round(phScore*0.40 + tempScore*0.18 + moistScore*0.18 + syn*0.24));
    }

    function getBestPlantId(catKey, b) {
      let best = POLYCAT_PLANTS[catKey][0], bestS = 0;
      POLYCAT_PLANTS[catKey].forEach(p => { const s=polycatPlantScore(p,catKey,b); if(s>bestS){bestS=s;best=p;} });
      return best.id;
    }

    function initPolycatChoice(bedId) {
      if (!st.polycatChoice) st.polycatChoice = {};
      if (!st.polycatChoice[bedId]) {
        const b = st.beds.find(b=>b.id===bedId)||st.beds[0];
        st.polycatChoice[bedId] = {};
        for (const cat of POLYCAT_DEFS) st.polycatChoice[bedId][cat.key] = getBestPlantId(cat.key, b);
      }
      return st.polycatChoice[bedId];
    }

    function selectPolycatPlant(bedId, catKey, plantId) {
      initPolycatChoice(bedId);
      st.polycatChoice[bedId][catKey] = plantId;
      render(false);
    }

    function polycatOptimality(bedId) {
      const b = st.beds.find(b=>b.id===bedId)||st.beds[0];
      const choices = initPolycatChoice(bedId);
      let score = 22;
      for (const cat of POLYCAT_DEFS) {
        const plant = POLYCAT_PLANTS[cat.key].find(p=>p.id===choices[cat.key])||POLYCAT_PLANTS[cat.key][0];
        score += POLYCAT_W[cat.key] * polycatPlantScore(plant, cat.key, b) / 100;
      }
      return Math.min(99, Math.round(score));
    }

    // ── Planting layout screen ──────────────────────────────────────────────
    function plantingLayoutSVG(b, cabaiPts, marigoldPts, lemPts) {
      const W = b.width * 100;   // 200 cm
      const L = b.length * 100;  // 700 cm
      // Scale to a nice display size (same aspect clamping as existing layoutHTML)
      const DH = Math.min(620, Math.max(260, (L / W) * 260));
      const DW = Math.min(360, Math.max(230, (W / L) * DH));
      const sx = DW / W, sy = DH / L;
      const PL = 28, PT = 12, PR = 6, PB = 26;
      const vbW = DW + PL + PR, vbH = DH + PT + PB;
      const bx = PL, by = PT;
      const g = [];
      // Bed fill + border
      g.push(`<rect x="${bx}" y="${by}" width="${DW}" height="${DH}" fill="#2e5228" stroke="rgba(255,255,255,.22)" stroke-width="1" rx="2"/>`);
      // Subtle grid lines
      for (let x = 50; x < W; x += 50) g.push(`<line x1="${(bx+x*sx).toFixed(1)}" y1="${by}" x2="${(bx+x*sx).toFixed(1)}" y2="${by+DH}" stroke="rgba(255,255,255,.07)" stroke-width="0.5"/>`);
      for (let y = 60; y < L; y += 60)  g.push(`<line x1="${bx}" y1="${(by+y*sy).toFixed(1)}" x2="${bx+DW}" y2="${(by+y*sy).toFixed(1)}" stroke="rgba(255,255,255,.07)" stroke-width="0.5"/>`);
      // X ruler (bottom) every 50 cm, label every 100 cm
      for (let x = 0; x <= W; x += 50) {
        const px = (bx + x * sx).toFixed(1);
        g.push(`<line x1="${px}" y1="${by+DH}" x2="${px}" y2="${by+DH+5}" stroke="#7aafb8" stroke-width="0.7"/>`);
        if (x % 100 === 0) g.push(`<text x="${px}" y="${by+DH+13}" text-anchor="middle" font-size="8" fill="#7aafb8">${(x/100).toFixed(0)}m</text>`);
      }
      g.push(`<text x="${bx+DW/2}" y="${by+DH+24}" text-anchor="middle" font-size="7" fill="#4d7585">lebar ${b.width}m</text>`);
      // Y ruler (left) every 100 cm
      for (let y = 0; y <= L; y += 100) {
        const py = (by + y * sy).toFixed(1);
        g.push(`<line x1="${bx-5}" y1="${py}" x2="${bx}" y2="${py}" stroke="#7aafb8" stroke-width="0.7"/>`);
        g.push(`<text x="${bx-7}" y="${(+py+3).toFixed(0)}" text-anchor="end" font-size="8" fill="#7aafb8">${y/100}m</text>`);
      }
      // Lemongrass — green diamond
      lemPts.forEach(({x, y}) => {
        const px = (bx+x*sx).toFixed(1), py = (by+y*sy).toFixed(1), r = 5.5;
        g.push(`<polygon points="${px},${(+py-r).toFixed(1)} ${(+px+r).toFixed(1)},${py} ${px},${(+py+r).toFixed(1)} ${(+px-r).toFixed(1)},${py}" fill="#52b030" stroke="rgba(255,255,255,.7)" stroke-width="0.8"/>`);
      });
      // Marigold — orange 6-point star
      marigoldPts.forEach(({x, y}) => {
        const px = bx+x*sx, py = by+y*sy, r = 5;
        const pts = Array.from({length:6},(_,i)=>{const a=(i*60-90)*Math.PI/180;return `${(px+r*Math.cos(a)).toFixed(1)},${(py+r*Math.sin(a)).toFixed(1)}`;}).join(' ');
        g.push(`<polygon points="${pts}" fill="#f5a623" stroke="rgba(255,255,255,.55)" stroke-width="0.8"/>`);
      });
      // Cabai — red circle
      cabaiPts.forEach(({x, y}) => {
        g.push(`<circle cx="${(bx+x*sx).toFixed(1)}" cy="${(by+y*sy).toFixed(1)}" r="3.5" fill="#c85030" stroke="rgba(255,255,255,.5)" stroke-width="0.8"/>`);
      });
      return `<svg viewBox="0 0 ${vbW} ${vbH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block"><rect width="${vbW}" height="${vbH}" fill="#1a3820"/>${g.join('')}</svg>`;
    }

    function S_plantlayout() {
      const b = st.beds.find(b=>b.id===(st.layoutBedId||st.beds[0].id))||st.beds[0];
      const choices = st.polycatChoice?.[b.id] || {};
      const cancelled = st.polycatCancelled?.[b.id] || {};
      const priorityCats = getPriorityCats(st.survey);
      const refugiaActive = priorityCats.includes('refugia') && !cancelled.refugia;
      const herbsActive   = priorityCats.includes('herbs')   && !cancelled.herbs;
      const refugiaPlant  = POLYCAT_PLANTS.refugia.find(p=>p.id===choices.refugia)||POLYCAT_PLANTS.refugia[0];
      const herbsPlant    = POLYCAT_PLANTS.herbs.find(p=>p.id===choices.herbs)||POLYCAT_PLANTS.herbs[0];

      const W = b.width  * 100;  // 200 cm
      const L = b.length * 100;  // 700 cm

      // Marigold: along both long edges (x=22 & x=W-22), every 45 cm
      const marigoldPts = [];
      if (refugiaActive) {
        const edge = 22, step = 45;
        for (let y = edge; y <= L - edge; y += step) {
          marigoldPts.push({x: edge, y});
          marigoldPts.push({x: W - edge, y});
        }
      }
      // Lemongrass: both short ends (y=25 & y=L-25), every 50 cm across width
      const lemPts = [];
      if (herbsActive) {
        const margin = 25, step = 50;
        for (let x = margin; x <= W - margin; x += step) {
          lemPts.push({x, y: margin});
          lemPts.push({x, y: L - margin});
        }
      }
      // Cabai: interior 50×60 cm grid, clear of companion zones
      const cabaiPts = [];
      const cyStart = herbsActive ? 75 : 40, cyEnd = L - cyStart;
      for (let x = 50; x <= W - 50; x += 50)
        for (let y = cyStart; y <= cyEnd; y += 60)
          cabaiPts.push({x, y});

      const svg = plantingLayoutSVG(b, cabaiPts, marigoldPts, lemPts);

      return `<section>
        <div class="top" style="padding-bottom:14px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <button onclick="nav('companion')" style="background:none;border:none;padding:0;font-size:18px;color:var(--muted);cursor:pointer;line-height:1">←</button>
            <div class="step" style="margin:0">Planting Layout</div>
          </div>
          <h1>${b.name||b.id}</h1>
          <p class="sub">${crop().common} · ${b.length}m × ${b.width}m · pH ${fmtPh(b.ph)}</p>
        </div>
        <div class="section stack">
          <div style="background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden">
            ${svg}
          </div>
          <!-- Legend -->
          <div class="legend" style="flex-wrap:wrap;gap:6px">
            <span class="chip"><span style="color:#c85030;font-size:10px">●</span> ${crop().common} (${cabaiPts.length}) · 50×60cm</span>
            ${refugiaActive ? `<span class="chip"><span style="color:#f5a623;font-size:10px">★</span> ${refugiaPlant.name} (${marigoldPts.length}) · 45×45cm</span>` : ''}
            ${herbsActive   ? `<span class="chip"><span style="color:#52b030;font-size:10px">◆</span> ${herbsPlant.name} (${lemPts.length}) · 50×50cm</span>` : ''}
          </div>
          <!-- Placement notes -->
          <div class="panel stack" style="gap:10px">
            <div style="font-size:11px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Placement rationale</div>
            ${refugiaActive ? `<div style="display:flex;gap:10px;align-items:flex-start">
              <span style="color:#f5a623;font-size:16px;flex-shrink:0;margin-top:1px">★</span>
              <div style="font-size:12px;color:var(--ink);line-height:1.55"><strong>${refugiaPlant.name}</strong> — ditempatkan di kedua tepi panjang (border row) sehingga tawon parasitoid direkrut dari seluruh sisi bed.</div>
            </div>` : ''}
            ${herbsActive ? `<div style="display:flex;gap:10px;align-items:flex-start">
              <span style="color:#52b030;font-size:16px;flex-shrink:0;margin-top:1px">◆</span>
              <div style="font-size:12px;color:var(--ink);line-height:1.55"><strong>${herbsPlant.name}</strong> — ditempatkan di kedua ujung pendek sebagai penghalang aromatik, mengganggu navigasi ngengat dari dua arah.</div>
            </div>` : ''}
            <div style="display:flex;gap:10px;align-items:flex-start">
              <span style="color:#c85030;font-size:16px;flex-shrink:0;margin-top:1px">●</span>
              <div style="font-size:12px;color:var(--ink);line-height:1.55"><strong>${crop().common}</strong> — ${cabaiPts.length} tanaman di zona tengah, jarak 50×60cm sesuai database penelitian.</div>
            </div>
          </div>
        </div>
      </section>`;
    }

    function hexToRgbStr(hex) {
      const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
      return `${r},${g},${b}`;
    }

    function bedMapTileHTML(b, index = 0) {
      const p = calcBed(b);
      const compId = selectedCompanion(b);
      const comp = companionDb[compId];
      const placement = selectedPlacement(b);
      const [mainKind, mainColor] = cropShape(st.crop);
      const [compKind, compColor] = companionShape(compId);
      const g = bedGeometry(b, p);
      const reservePerimeter = placement === 'perimeter' && p.rows > 4 && p.cols > 2;
      const dots = [];
      const mainEvery = Math.max(1, Math.ceil((g.xs.length * g.ys.length) / 42));
      let i = 0;
      g.ys.forEach((yCm, r) => {
        g.xs.forEach((xCm, c) => {
          if (reservePerimeter && (r === 0 || r === g.ys.length - 1 || c === 0 || c === g.xs.length - 1)) return;
          if (i++ % mainEvery !== 0) return;
          dots.push(`<span class="bed-mini-dot" style="left:${percentPos(xCm, g.widthCm)}%;top:${percentPos(yCm, g.lengthCm)}%">${shapeHTML(mainKind, mainColor, 8)}</span>`);
        });
      });
      const compPts = companionPositions(b, p, comp, placement, g);
      const compEvery = Math.max(1, Math.ceil(compPts.length / 18));
      compPts.forEach((pt, idx) => {
        if (idx % compEvery !== 0) return;
        dots.push(`<span class="bed-mini-dot" style="left:${pt.x}%;top:${pt.y}%">${shapeHTML(compKind, compColor, 10)}</span>`);
      });
      const status = band(Math.min(p.quality, p.env));
      return `<button class="bed-map-tile ${st.activeBed===b.id?'active':''}" onclick="openBedPopup('${b.id}')">
        <div class="bed-map-top">
          <strong>Bed ${b.id}</strong>
          <span class="chip ${status.cls}">${status.label}</span>
        </div>
        <div class="bed-mini-map">${dots.join('')}</div>
        <p class="sub" style="font-size:11px;margin-top:7px">${p.count} ${crop().common} - pH ${fmtPh(b.ph)}</p>
      </button>`;
    }

    function layoutHTML(b) {
      const p = calcBed(b);
      const compId = selectedCompanion(b);
      const comp = companionDb[compId];
      const placement = selectedPlacement(b);
      const dots = [];
      const [mainKind, mainColor] = cropShape(st.crop);
      const [compKind, compColor] = companionShape(compId);
      const g = bedGeometry(b, p);
      const reservePerimeter = placement === 'perimeter' && p.rows > 4 && p.cols > 2;
      g.ys.forEach((yCm, r) => {
        g.xs.forEach((xCm, c) => {
          if (reservePerimeter && (r === 0 || r === g.ys.length - 1 || c === 0 || c === g.xs.length - 1)) return;
          const x = percentPos(xCm, g.widthCm);
          const y = percentPos(yCm, g.lengthCm);
          dots.push(`<span class="plant-dot shape-dot" style="left:${x}%;top:${y}%" title="${crop().n}">${shapeHTML(mainKind, mainColor, 13)}</span>`);
        });
      });
      const addComp = (x, y) => dots.push(`<span class="plant-dot shape-dot" style="left:${x}%;top:${y}%" title="${comp.n}">${shapeHTML(compKind, compColor, compId === 'jagung_sela' ? 16 : 12)}</span>`);
      companionPositions(b, p, comp, placement, g).forEach(pt => addComp(pt.x, pt.y));
      const yGuideStep = Math.max(1, Math.ceil(g.ys.length / 18));
      const guideLines = [
        ...g.xs.map(x => `<span class="layout-guide-line v" style="left:${percentPos(x, g.widthCm)}%"></span>`),
        ...g.ys.filter((_, i) => i % yGuideStep === 0).map(y => `<span class="layout-guide-line h" style="top:${percentPos(y, g.lengthCm)}%"></span>`)
      ].join('');
      const aspectH = clamp((b.length / b.width) * 260, 260, 620);
      const layoutW = Math.min(360, Math.max(230, b.width / b.length * aspectH));
      return `<div class="layout-wrap">
        <div class="scale-stage">
          <div class="scale-left"><span>0m</span><span>${fmtPlain(b.length)}m</span></div>
          <div class="layout" style="--layout-w:${layoutW}px;--layout-h:${aspectH}px">
            ${guideLines}
            ${dots.join('')}
          </div>
          <div class="scale-bottom"><span>0m</span><span>${fmtPlain(b.width)}m</span></div>
        </div>
      </div>
      <div class="legend">
        <span class="chip">${shapeHTML(mainKind, mainColor, 10)} ${crop().n}: ${p.actualX}x${p.actualY} cm</span>
        <span class="chip">${shapeHTML(compKind, compColor, 10)} ${comp.n}: ${placementLabel(placement)}</span>
        <span class="chip">Scale ${fmtPlain(b.width)}m x ${fmtPlain(b.length)}m</span>
      </div>`;
    }

        <div class="section stack">

            return `<div class="panel stack">
              ${bedSummaryHTML(b)}
              <button class="mini-action" onclick="toggleBedExpanded('${b.id}')">${expanded ? 'Collapse full specification' : 'Open full specification'}</button>
              ${expanded ? `${bedActionHTML(b, p)}${spacingGuideHTML(b)}${layoutHTML(b)}` : ''}
            </div>`;
          }).join('')}
        </div>
      </section>`;
    }
    function T_sensor() {
      return `<section>
        <div class="top"><h1>Live sensor</h1><p class="sub">MQTT data updates the environmental scoring without changing the registered bed dimensions.</p></div>
        <div class="section stack">
          ${[
            ['Air temp', `${fmtPh(live.temp_air)}°C`, '🌡️'],
            ['Air humidity', `${fmtPh(live.hum_air)}%`, '💧'],
            ['Soil moisture', `${fmtPh(live.hum_soil)}%`, '〰️'],
            ['Soil pH', fmtPh(live.ph_soil), '🧪']
          ].map(m => `<div class="panel" style="display:flex;align-items:center;gap:14px">
            <div class="crop-icon" style="margin:0">${m[2]}</div><div><h2>${m[1]}</h2><p class="sub">${m[0]}</p></div>
          </div>`).join('')}
        </div>
      </section>`;
    }
    function T_settings() {
      return `<section>
        <div class="top"><h1>Settings</h1><p class="sub">Field setup can be adjusted any time and the layout will recompute from the database.</p></div>
        <div class="section stack">
          <button class="btn secondary" onclick="nav('field')">Edit crop and target</button>
          <button class="btn secondary" onclick="nav('beds')">Edit raised bed sizes</button>
          <button class="btn ghost" onclick="nav('login')">Sign out</button>
        </div>
      </section>`;
    }

    function render(resetScroll = true) {
      const scr = document.getElementById('scr');
      const navEl = document.getElementById('bottom-nav');
      navEl.classList.toggle('show', st.screen === 'main');
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === st.tab || (btn.dataset.tab === 'dashboard' && st.tab === 'bed')));
      const screens = {login:S_login, field:S_field, beds:S_beds, tutorial:S_tutorial, scan:S_scan, fieldoverview:S_fieldoverview, soil:S_soil, survey:S_survey, ailoading:S_ailoading, companion:S_companion, plantlayout:S_plantlayout};
      if (screens[st.screen]) scr.innerHTML = screens[st.screen]();
      else {
        const tabs = {dashboard:T_dashboard, beds:T_beds, sensor:T_sensor, settings:T_settings};
        scr.innerHTML = (tabs[st.tab] || T_dashboard)();
      }
      if (st.screen === 'main' && st.mapPopupBed) scr.innerHTML += bedPopupHTML();
      if (resetScroll) scr.scrollTop = 0;
      const now = new Date();
      document.getElementById('clock').textContent = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    }

    function setupMQTT() {
      if (!window.mqtt) return;
      try {
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {clientId:'polyfarm_' + Math.random().toString(16).slice(2), reconnectPeriod:2500});
        client.on('connect', () => {
          document.getElementById('mqtt-dot').className = 'mqtt-dot ok';
          client.subscribe('hackviet/data/sensors');
          client.subscribe('hackviet/data/gps');
        });
        client.on('error', () => document.getElementById('mqtt-dot').className = 'mqtt-dot err');
        client.on('message', (topic, msg) => {
          try {
            const d = JSON.parse(msg.toString());
            if (topic.includes('sensors')) {
              ['temp_air','hum_air','hum_soil','ph_soil'].forEach(k => { if (d[k] != null) live[k] = Number(d[k]); });
              live.ts = d.timestamp || live.ts;
              if (st.screen === 'main') render(false);
            }
            if (topic.includes('gps')) { live.lat = d.lat ?? live.lat; live.long = d.long ?? live.long; }
          } catch(e) {}
        });
      } catch(e) {}
    }

    setInterval(() => {
      const now = new Date();
      document.getElementById('clock').textContent = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    }, 30000);
    setupMQTT();
    render();
  </script>

</body>
</html>
