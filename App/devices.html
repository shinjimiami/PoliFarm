<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Device - PoliFarm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body style="background-color: var(--bg-color);">
    <div class="devices-page">
        <div class="devices-header">
            <h1>Welcome back, Farmer!</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">Select the device or field you want to monitor today.</p>
        </div>

        <div class="devices-grid">
            <a href="index.html" class="device-card">
                <div class="device-icon"><i class="ph ph-house-line"></i></div>
                <h2>Greenhouse 1</h2>
                <p>Hydroponic Vegetable Farm</p>
                <div class="device-status">Active</div>
            </a>

            <a href="index.html" class="device-card">
                <div class="device-icon"><i class="ph ph-plant"></i></div>
                <h2>Lahan A</h2>
                <p>Organic Rice Field</p>
                <div class="device-status">Active</div>
            </a>

            <a href="index.html" class="device-card">
                <div class="device-icon" style="color: var(--accent-brown); background: var(--accent-brown-light);"><i
                        class="ph ph-tree"></i></div>
                <h2>Kebun B</h2>
                <p>Tropical Fruit Plantation</p>
                <div class="device-status" style="color: var(--accent-brown); background: var(--accent-brown-light);">
                    Offline</div>
            </a>
        </div>
    </div>
</body>

</html>
